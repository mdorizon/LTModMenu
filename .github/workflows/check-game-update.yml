name: Check lofi.town game update

on:
  schedule:
    # 17h Paris : 15h UTC (été CEST) ou 16h UTC (hiver CET) — on lance les deux,
    # le timezone gate skip celui qui tombe pas à la bonne heure.
    # Mardi 9h Paris : 7h UTC (été) ou 8h UTC (hiver).
    # Pas de week-end : le lundi rattrape les changements du week-end.
    - cron: "0 15,16 * * 1,3,4,5"
    - cron: "0 7,8 * * 2"
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Timezone gate : skip si c'est pas la bonne heure à Paris.
      # ubuntu-latest a les tzdata, TZ=Europe/Paris gère le DST automatiquement.
      - name: Timezone gate
        id: tz
        run: |
          PARIS_HOUR=$(TZ=Europe/Paris date +%H)
          DOW=$(TZ=Europe/Paris date +%u)  # 1=lun ... 7=dim
          if [ "$DOW" = "2" ] && [ "$PARIS_HOUR" = "09" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "$DOW" != "2" ] && [ "$PARIS_HOUR" = "17" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "Skip — Paris hour is ${PARIS_HOUR}h, not the target slot"
          fi

      - uses: actions/checkout@v4
        if: steps.tz.outputs.run == 'true'

      - uses: oven-sh/setup-bun@v2
        if: steps.tz.outputs.run == 'true'
        with:
          bun-version: latest

      - name: Check for game update
        id: check
        if: steps.tz.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bun run scripts/check-game-update.ts --save

      - name: Push manifest update
        if: steps.tz.outputs.run == 'true' && steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gameFiles/manifest.json
          git diff --cached --quiet && exit 0
          git commit -m "🔍 Update game manifest — lofi.town rebuild detected"
          git push

      - name: Create issue
        id: issue
        if: steps.tz.outputs.run == 'true' && steps.check.outputs.create_issue == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SEVERITY="${{ steps.check.outputs.severity }}"
          ISSUE_URL=$(gh issue create \
            --title "⚠️ Mise à jour lofi.town — intervention requise ($SEVERITY)" \
            --label "Game Update" \
            --body "$(cat <<'ISSUE_EOF'
          ## Mise à jour détectée

          La CI a détecté un rebuild de lofi.town qui nécessite une vérification du mod.

          ### Sévérité : `${{ steps.check.outputs.severity }}`

          ### Analyse IA

          ${{ steps.check.outputs.risk_assessment }}

          ### Diff

          ```
          ${{ steps.check.outputs.summary }}
          ```

          ### Comment investiguer

          ```bash
          bun run scripts/check-game-update.ts --analyze
          ```

          Vérifier que le mod fonctionne en jeu (stores capturés, gameApp hookée, pêche fonctionnelle).
          Si de nouveaux modules sont apparus, analyser leur contenu.
          Mettre à jour `gameFiles/analysis/update-changelog.md` si nécessaire.
          ISSUE_EOF
          )")
          echo "url=$ISSUE_URL" >> $GITHUB_OUTPUT

      - name: Notify Discord
        if: steps.tz.outputs.run == 'true' && steps.check.outputs.discord_title != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          ISSUE_URL="${{ steps.issue.outputs.url }}"

          # Build description from multiline output
          DESCRIPTION=$(cat <<'DESC_EOF'
          ${{ steps.check.outputs.discord_description }}
          DESC_EOF
          )

          # Append issue link if available
          if [ -n "$ISSUE_URL" ]; then
            DESCRIPTION="${DESCRIPTION}

          📋 **Issue :** ${ISSUE_URL}"
          fi

          # Escape for JSON using python3
          TITLE_JSON=$(printf '%s' "${{ steps.check.outputs.discord_title }}" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          DESC_JSON=$(printf '%s' "$DESCRIPTION" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")

          curl -sf -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": ${TITLE_JSON},
                \"color\": ${{ steps.check.outputs.discord_color }},
                \"description\": ${DESC_JSON},
                \"footer\": {
                  \"text\": \"LTModMenu CI\"
                }
              }]
            }" \
            "$DISCORD_WEBHOOK_URL"

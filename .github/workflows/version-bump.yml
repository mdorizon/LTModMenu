name: Version Bump & Release

on:
  pull_request:
    types: [closed]
    branches: [main]

  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  bump:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       (contains(github.event.pull_request.labels.*.name, 'release:patch') ||
        contains(github.event.pull_request.labels.*.name, 'release:minor') ||
        contains(github.event.pull_request.labels.*.name, 'release:major')))
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type
        id: bump-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          elif ${{ contains(github.event.pull_request.labels.*.name, 'release:major') }}; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif ${{ contains(github.event.pull_request.labels.*.name, 'release:minor') }}; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r major minor patch <<< "$CURRENT"

          case "${{ steps.bump-type.outputs.type }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          NEW="${major}.${minor}.${patch}"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT ŌåÆ $NEW (${{ steps.bump-type.outputs.type }})"

          # Update package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
            pkg.version = '${NEW}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "­¤ö¢ v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --tags

  build:
    needs: bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump.outputs.version }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/ltmodmenu.user.js
            dist/ltmodmenu.meta.js

  release:
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump.outputs.version }}
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Generate release notes
        id: notes
        run: |
          CURRENT_TAG="v${{ needs.bump.outputs.version }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          fi

          COMMITS=$(git log "$RANGE" --pretty=format:"%s" --no-merges)

          features="" fixes="" refactors="" ui="" infra="" docs="" other=""

          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            case "$msg" in
              *Ō£©*)       features+=$'\n'"- $msg" ;;
              *­¤Éø*|*­¤®╣*) fixes+=$'\n'"- $msg" ;;
              *ŌÖ╗’ĖÅ*|*­¤ÅŚ’ĖÅ*|*­¤öź*) refactors+=$'\n'"- $msg" ;;
              *­¤Æä*|*­¤Ä©*) ui+=$'\n'"- $msg" ;;
              *­¤ö¦*|*­¤æĘ*|*­¤ÆÜ*|*­¤Öł*|*Ō¼å’ĖÅ*|*Ō¼ć’ĖÅ*) infra+=$'\n'"- $msg" ;;
              *­¤ōØ*)       docs+=$'\n'"- $msg" ;;
              *­¤ö¢*|*­¤öĆ*) ;; # skip version bumps and merge commits
              *)           other+=$'\n'"- $msg" ;;
            esac
          done <<< "$COMMITS"

          body=""
          [ -n "$features" ]  && body+="## Features${features}"$'\n\n'
          [ -n "$fixes" ]     && body+="## Bug Fixes${fixes}"$'\n\n'
          [ -n "$refactors" ] && body+="## Refactoring${refactors}"$'\n\n'
          [ -n "$ui" ]        && body+="## UI / Style${ui}"$'\n\n'
          [ -n "$infra" ]     && body+="## Infrastructure${infra}"$'\n\n'
          [ -n "$docs" ]      && body+="## Documentation${docs}"$'\n\n'
          [ -n "$other" ]     && body+="## Other${other}"$'\n\n'

          if [ -z "$body" ]; then
            body="No notable changes."
          fi

          {
            echo "body<<RELEASE_EOF"
            echo "$body"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump.outputs.version }}
          files: dist/ltmodmenu.user.js
          body: ${{ steps.notes.outputs.body }}

  deploy-pages:
    needs: [bump, build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
